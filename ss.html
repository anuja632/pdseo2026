<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= COMMON SPLIT ================= */
.crm-split-sec{
  display:flex;
  align-items:center;
  padding:80px 6%;
  gap:50px;
}

.crm-split-img{
  flex:1;
}

.crm-split-img img{
  width:100%;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.crm-split-content{
  flex:1;
}

/* TITLE */
.crm-title-main{
  font-size:32px;
  margin-bottom:30px;
  color:#0F2239;
}

/* ================= WHY CHOOSE ================= */
.crm-why-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.crm-why-card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}

.crm-why-card i{
  color:#EA0000;
  margin-bottom:8px;
}

.crm-why-card h3{
  font-size:15px;
}

.crm-why-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:#EA0000;
  transform:scaleX(0);
  transform-origin:left;
  transition:0.4s;
  opacity:0.08;
}

.crm-why-card:hover::before{
  transform:scaleX(1);
}

.crm-why-card:hover{
  transform:translateY(-6px);
}

/* ================= INDUSTRY ================= */
.crm-industry-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.crm-industry-box{
  border:2px solid #eee;
  padding:20px;
  border-radius:12px;
  text-align:center;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.crm-industry-box i{
  font-size:22px;
  color:#00008b;
  margin-bottom:10px;
}

.crm-industry-box p{
  font-size:14px;
}

.crm-industry-box::before{
  content:"";
  position:absolute;
  inset:0;
  background:#00008b;
  transform:scaleY(0);
  transform-origin:bottom;
  transition:0.4s;
}

.crm-industry-box:hover::before{
  transform:scaleY(1);
}

.crm-industry-box:hover i,
.crm-industry-box:hover p{
  color:#fff;
  position:relative;
  z-index:1;
}

/* ================= REVERSE ================= */
.crm-reverse{
  flex-direction:row-reverse;
}

/* ================= CTA ================= */
.crm-cta-sec{
  position:relative;
  padding:100px 6%;
  text-align:center;
  background:#0F2239;
  color:#fff;
  overflow:hidden;
}

.crm-cta-shape{
  position:absolute;
  border-radius:50%;
  opacity:0.2;
  animation:float 6s infinite ease-in-out;
}

.crm-cta-shape.one{
  width:220px;
  height:220px;
  background:#EA0000;
  top:-60px;
  left:-60px;
}

.crm-cta-shape.two{
  width:160px;
  height:160px;
  background:#00bcd4;
  bottom:-50px;
  right:-50px;
}

.crm-cta-shape.three{
  width:120px;
  height:120px;
  background:#ff9800;
  top:40%;
  left:80%;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-25px);}
}

/* ================= FAQ ================= */
.crm-faq-sec{
  padding:80px 6%;
}

.crm-faq-title{
  text-align:center;
  font-size:34px;
  margin-bottom:50px;
  color:#0F2239;
}

.crm-faq-row{
  display:flex;
  gap:50px;
  align-items:center;
}

.crm-faq-left{
  flex:1;
}

.crm-faq-left img{
  width:100%;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.crm-faq-right{
  flex:1;
}

.crm-faq-card{
  background:#fff;
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

.crm-faq-top{
  display:flex;
  align-items:center;
  gap:12px;
}

.crm-faq-number{
  width:35px;
  height:35px;
  background:#00008b;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
}

.crm-faq-question{
  font-size:15px;
  font-weight:600;
  color:#0F2239;
}

.crm-faq-answer{
  max-height:0;
  overflow:hidden;
  font-size:14px;
  color:#555;
  transition:0.4s;
  padding-left:47px;
}

.crm-faq-card.active .crm-faq-answer{
  max-height:140px;
  margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .crm-split-sec,
  .crm-faq-row{
    flex-direction:column;
  }
}

</style>
</head>

<body>

<!-- WHY CHOOSE -->
<section class="crm-split-sec">

  <div class="crm-split-img">
    <img src="https://images.unsplash.com/photo-1556761175-4b46a572b786">
  </div>

  <div class="crm-split-content">
    <h2 class="crm-title-main">Why Choose Us</h2>

    <div class="crm-why-grid">
      <div class="crm-why-card"><i class="fas fa-search"></i><h3>SEO Experts</h3></div>
      <div class="crm-why-card"><i class="fas fa-map-marker-alt"></i><h3>Local SEO</h3></div>
      <div class="crm-why-card"><i class="fas fa-chart-line"></i><h3>Proven Results</h3></div>
      <div class="crm-why-card"><i class="fas fa-file-alt"></i><h3>Reports</h3></div>
    </div>

  </div>

</section>

<!-- INDUSTRY -->
<section class="crm-split-sec crm-reverse">

  <div class="crm-split-img">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
  </div>

  <div class="crm-split-content">
    <h2 class="crm-title-main">Industries We Serve</h2>

    <div class="crm-industry-grid">
      <div class="crm-industry-box"><i class="fas fa-building"></i><p>Real Estate</p></div>
      <div class="crm-industry-box"><i class="fas fa-hard-hat"></i><p>Builders</p></div>
      <div class="crm-industry-box"><i class="fas fa-map"></i><p>Plots</p></div>
      <div class="crm-industry-box"><i class="fas fa-home"></i><p>Villas</p></div>
    </div>

  </div>

</section>

<!-- CTA -->
<section class="crm-cta-sec">

  <div class="crm-cta-shape one"></div>
  <div class="crm-cta-shape two"></div>
  <div class="crm-cta-shape three"></div>

  <h2>Need CRM Services?</h2>

</section>

<!-- FAQ -->
<section class="crm-faq-sec">

  <h2 class="crm-faq-title">FAQ</h2>

  <div class="crm-faq-row">

    <div class="crm-faq-left">
      <img src="https://images.unsplash.com/photo-1551434678-e076c223a692">
    </div>

    <div class="crm-faq-right">

      <div class="crm-faq-card active">
        <div class="crm-faq-top">
          <div class="crm-faq-number">01</div>
          <div class="crm-faq-question">What is CRM?</div>
        </div>
        <div class="crm-faq-answer">CRM manages leads and customers.</div>
      </div>

      <div class="crm-faq-card">
        <div class="crm-faq-top">
          <div class="crm-faq-number">02</div>
          <div class="crm-faq-question">Automation?</div>
        </div>
        <div class="crm-faq-answer">Yes it supports automation.</div>
      </div>

    </div>

  </div>

</section>

<!-- SCRIPT -->
<script>

const crmFaqCards = document.querySelectorAll(".crm-faq-card");

crmFaqCards.forEach(card => {
  card.addEventListener("click", () => {

    crmFaqCards.forEach(c => {
      if(c !== card){
        c.classList.remove("active");
      }
    });

    card.classList.toggle("active");

  });
});

</script>

</body>
</html>
